<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Erro — Neurabot</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Sora:wght@300;400;600;700&display=swap"
    rel="stylesheet" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Sora:wght@300;400;600;700&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none
    }

    html {
      scroll-behavior: smooth
    }

    body {
      background: #07070f;
      color: #fff;
      font-family: 'Sora', 'Segoe UI', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column
    }

    ::-webkit-scrollbar {
      width: 6px
    }

    ::-webkit-scrollbar-track {
      background: #0a0a14
    }

    ::-webkit-scrollbar-thumb {
      background: #00d4ff44;
      border-radius: 3px
    }

    /* ── Grid bg ── */
    .grid-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(0, 212, 255, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 212, 255, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: grid-fade 1.2s ease forwards
    }

    @keyframes grid-fade {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    /* ── Glow orbs ── */
    .glow-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0
    }

    .glow-orb-1 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #00d4ff18, transparent 70%);
      top: -100px;
      left: -100px
    }

    .glow-orb-2 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, #0088ff12, transparent 70%);
      bottom: -60px;
      right: -60px
    }

    /* ── Scan line ── */
    .scan-line {
      position: fixed;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00d4ff33, transparent);
      z-index: 1;
      pointer-events: none;
      animation: scan 6s linear infinite
    }

    @keyframes scan {
      0% {
        top: -10%
      }

      100% {
        top: 110%
      }
    }

    /* ── Layout ── */
    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px
    }

    /* ── Navbar ── */
    nav {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid #00d4ff0f
    }

    .nav-logo {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 20px;
      letter-spacing: 2px;
      color: #fff;
      text-decoration: none
    }

    .nav-logo span {
      color: #00d4ff
    }

    /* ── Main error section ── */
    .error-section {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      text-align: center
    }

    .error-inner {
      max-width: 640px;
      width: 100%;
      animation: fadeUp 0.7s ease both
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    /* ── Big code ── */
    .error-code {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(100px, 20vw, 180px);
      line-height: 1;
      letter-spacing: -4px;
      background: linear-gradient(135deg, #00d4ff, #0088ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      display: inline-block
    }

    .error-code::after {
      content: attr(data-code);
      position: absolute;
      inset: 0;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: inherit;
      line-height: 1;
      letter-spacing: -4px;
      -webkit-text-fill-color: transparent;
      background: linear-gradient(135deg, #00d4ff22, #0088ff11);
      -webkit-background-clip: text;
      background-clip: text;
      filter: blur(20px);
      z-index: -1;
      transform: translateY(8px)
    }

    /* ── Badge ── */
    .error-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #00d4ff0d;
      border: 1px solid #00d4ff22;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 600;
      color: #00d4ff;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 24px
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00d4ff;
      animation: blink 1.4s ease-in-out infinite
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    /* ── Title & desc ── */
    .error-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: clamp(22px, 5vw, 36px);
      color: #fff;
      margin: 16px 0 12px;
      letter-spacing: 1px
    }

    .error-desc {
      font-size: 15px;
      color: #8888aa;
      line-height: 1.8;
      margin-bottom: 36px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto
    }

    /* ── Buttons ── */
    .error-buttons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #00d4ff, #0088ff);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Sora', sans-serif;
      transition: all 0.2s;
      letter-spacing: 0.5px;
      text-decoration: none;
      text-align: center
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px #00d4ff44
    }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: #00d4ff;
      border: 1px solid #00d4ff55;
      border-radius: 8px;
      padding: 13px 28px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Sora', sans-serif;
      transition: all 0.2s;
      text-decoration: none;
      text-align: center
    }

    .btn-outline:hover {
      background: #00d4ff11;
      border-color: #00d4ff
    }

    /* ── Decorative divider ── */
    .error-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 48px auto 32px;
      max-width: 400px;
      opacity: .4
    }

    .error-divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, #00d4ff55)
    }

    .error-divider-line.r {
      background: linear-gradient(90deg, #00d4ff55, transparent)
    }

    .error-divider span {
      font-size: 11px;
      color: #00d4ff;
      letter-spacing: 2px;
      font-family: 'Orbitron', sans-serif;
      white-space: nowrap
    }

    /* ── Links rápidos ── */
    .quick-links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap
    }

    .quick-link {
      color: #8888aa;
      text-decoration: none;
      font-size: 13px;
      transition: color .2s;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .quick-link svg {
      width: 14px;
      height: 14px;
      opacity: .6
    }

    .quick-link:hover {
      color: #00d4ff
    }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 2;
      padding: 20px 40px;
      border-top: 1px solid #00d4ff0f;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px
    }

    .footer-copy {
      font-size: 12px;
      color: #444466
    }

    .footer-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #444466
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00ff88
    }

    /* ── Responsivo ── */
    @media(max-width:768px) {
      nav {
        padding: 14px 20px
      }

      footer {
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 20px
      }

      .error-buttons {
        flex-direction: column;
        align-items: center
      }

      .btn-primary,
      .btn-outline {
        width: 100%;
        max-width: 320px;
        justify-content: center
      }

      .glow-orb,
      .grid-bg,
      .scan-line {
        display: none !important
      }
    }

    @media(hover:none) {

      .btn-primary:hover,
      .btn-outline:hover {
        transform: none;
        box-shadow: none
      }
    }
  </style>
</head>
